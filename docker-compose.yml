services:
  surrealdb:
    image: surrealdb/surrealdb:v2.3
    restart: unless-stopped
    command:
      [
        "start",
        "--log",
        "warn",
        "--user",
        "${SURREALDB_USER}",
        "--pass",
        "${SURREALDB_PASS}",
        "file:/data/database.db"
      ]
    volumes:
      - surreal-data:/data

  surreal-schema:
    image: surrealdb/surrealdb:v2.3
    depends_on:
      - surrealdb
    volumes:
      - ./surreal/schema.surql:/schema.surql:ro
    command:
      [
        "import",
        "--conn",
        "http://surrealdb:8000/rpc",
        "--user",
        "${SURREALDB_USER}",
        "--pass",
        "${SURREALDB_PASS}",
        "--ns",
        "${SURREALDB_NS}",
        "--db",
        "${SURREALDB_DB}",
        "/schema.surql"
      ]
    restart: "on-failure:5"

  surreal-catalog:
    image: surrealdb/surrealdb:v2.3
    depends_on:
      - surrealdb
      - surreal-schema
    volumes:
      - ./surreal/catalog-prod.surql:/catalog-prod.surql:ro
    command:
      [
        "import",
        "--conn",
        "http://surrealdb:8000/rpc",
        "--user",
        "${SURREALDB_USER}",
        "--pass",
        "${SURREALDB_PASS}",
        "--ns",
        "${SURREALDB_NS}",
        "--db",
        "${SURREALDB_DB}",
        "/catalog-prod.surql"
      ]
    restart: "on-failure:5"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - surrealdb
      - surreal-schema
      - surreal-catalog
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_REQUIRE_EMAIL_VERIFICATION: ${BETTER_AUTH_REQUIRE_EMAIL_VERIFICATION:-true}
      SURREALDB_URL: http://surrealdb:8000/rpc
      SURREALDB_NS: ${SURREALDB_NS}
      SURREALDB_DB: ${SURREALDB_DB}
      SURREALDB_USER: ${SURREALDB_USER}
      SURREALDB_PASS: ${SURREALDB_PASS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_FROM: ${SMTP_FROM}
      FEEDBACK_ADMIN_EMAIL: ${FEEDBACK_ADMIN_EMAIL}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  surreal-data:
